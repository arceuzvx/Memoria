services:
  memoria:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    # Port is intentionally NOT exposed to the host.
    # Qdrant is only accessible via the internal Docker network,
    # and requires an API key for all requests.
    # Uncomment the following ONLY for local debugging:
    # ports:
    #   - "6333:6333"